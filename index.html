<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS — QA Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --navy:       #040e6b;
  --navy-mid:   #0b1c9e;
  --navy-glow:  rgba(4,14,107,0.12);
  --accent:     #e8ff47;
  --accent-dk:  #c8de00;
  --red:        #f03a3a;
  --red-bg:     #fff2f2;
  --green:      #00c472;
  --green-bg:   #eafff5;
  --amber:      #f59e0b;
  --amber-bg:   #fffbeb;
  --bg:         #efede6;
  --bg2:        #e8e6de;
  --surface:    #fafaf7;
  --surface2:   #f3f2ec;
  --border:     #dddad0;
  --text:       #0f0f22;
  --muted:      #868696;
  --mono:       'DM Mono', monospace;
  --serif:      'Fraunces', serif;
  --r:          7px;
  --sh:         0 1px 3px rgba(4,14,107,0.07), 0 4px 16px rgba(4,14,107,0.07);
  --sh-lg:      0 2px 8px rgba(4,14,107,0.1), 0 12px 40px rgba(4,14,107,0.12);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── LAYOUT ── */
.app { display:flex; min-height:100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--navy);
  position: fixed;
  inset: 0 auto 0 0;
  display: flex;
  flex-direction: column;
  z-index: 100;
}

.sb-logo {
  padding: 22px 18px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sb-wordmark {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -0.02em;
  line-height: 1;
}
.sb-wordmark em { color: var(--accent); font-style: normal; }
.sb-sub {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 5px;
}

.sb-nav { flex:1; padding: 10px 0; overflow-y:auto; }

.sb-section-label {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  padding: 12px 18px 5px;
}

.sb-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 18px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.14s;
}
.sb-item:hover { color:#fff; background:rgba(255,255,255,0.05); }
.sb-item.active { color:var(--accent); border-left-color:var(--accent); background:rgba(232,255,71,0.05); }
.sb-item .si { font-size:14px; width:18px; text-align:center; flex-shrink:0; }

.sb-foot {
  padding: 14px 18px;
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: rgba(255,255,255,0.35);
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.dot.ok { background:var(--green); box-shadow: 0 0 7px var(--green); }

/* ── MAIN ── */
.main { margin-left:220px; flex:1; min-width:0; }

/* ── TOPBAR ── */
.topbar {
  height: 54px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--navy);
}
.topbar-right { display:flex; gap:8px; align-items:center; }

/* ── BUTTONS ── */
.btn {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  padding: 7px 15px;
  border-radius: var(--r);
  border: none;
  cursor: pointer;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: all 0.14s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.btn:disabled { opacity:0.4; pointer-events:none; }
.btn-navy  { background:var(--navy); color:#fff; }
.btn-navy:hover { background:var(--navy-mid); }
.btn-accent { background:var(--accent); color:var(--navy); font-weight:600; }
.btn-accent:hover { background:var(--accent-dk); }
.btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn-ghost:hover { color:var(--text); border-color:var(--text); }
.btn-red { background:transparent; color:var(--red); border:1px solid #fcc; }
.btn-red:hover { background:var(--red-bg); }

/* ── PAGES ── */
.page { display:none; }
.page.on { display:block; }

/* ── DASHBOARD ── */
.dash-body { padding:26px 28px 60px; }

.stats-row {
  display: flex;
  gap: 10px;
  margin-bottom: 26px;
  flex-wrap: wrap;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 18px;
  flex: 1;
  min-width: 100px;
  box-shadow: var(--sh);
}
.stat-n {
  font-family: var(--serif);
  font-size: 30px;
  font-weight: 600;
  letter-spacing: -0.04em;
  line-height: 1;
  color: var(--navy);
}
.stat-l { font-size: 10px; color:var(--muted); margin-top:4px; letter-spacing:0.03em; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px,1fr));
  gap: 12px;
}

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--sh);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  position: relative;
}
.card:hover { transform:translateY(-2px); box-shadow:var(--sh-lg); border-color:rgba(4,14,107,0.3); }

.card-bar { height:3px; }
.bar-todo  { background: var(--border); }
.bar-low   { background: var(--red); }
.bar-mid   { background: var(--amber); }
.bar-high  { background: var(--green); }
.bar-done  { background: var(--navy); }

.card-body { padding:15px 16px; }
.card-name {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 3px;
  color: var(--text);
}
.card-url {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-foot {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.card-pct {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.04em;
  line-height: 1;
}
.card-meta { font-size:10px; color:var(--muted); text-align:right; line-height:1.5; }

.chips { display:flex; gap:4px; margin-top:9px; flex-wrap:wrap; }
.chip {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 100px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.chip-red   { background:var(--red-bg);   color:var(--red); }
.chip-green { background:var(--green-bg); color:#007a47; }
.chip-navy  { background:rgba(4,14,107,0.08); color:var(--navy); }
.chip-amber { background:var(--amber-bg); color:#8a5c00; }

.empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 24px;
  color: var(--muted);
}
.empty-icon { font-size:40px; margin-bottom:16px; }
.empty h3 { font-family:var(--serif); font-size:20px; font-weight:300; font-style:italic; color:var(--text); margin-bottom:8px; }
.empty p { font-size:12px; max-width:280px; margin:0 auto 20px; line-height:1.6; }

/* ── MODAL ── */
.overlay {
  position: fixed; inset:0;
  background: rgba(4,14,107,0.3);
  backdrop-filter: blur(5px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.on { display:flex; }

.modal {
  background: var(--surface);
  border-radius: 12px;
  box-shadow: var(--sh-lg);
  width: 100%;
  max-width: 460px;
  overflow: hidden;
  animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { transform:scale(0.94) translateY(10px); opacity:0; }
  to   { transform:none; opacity:1; }
}

.modal-hd {
  background: var(--navy);
  border-bottom: 3px solid var(--accent);
  padding: 22px 26px;
}
.modal-hd h2 {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 300;
  font-style: italic;
  color: #fff;
  letter-spacing: -0.02em;
}
.modal-hd p { font-size:11px; color:rgba(255,255,255,0.4); margin-top:4px; }
.modal-bd { padding:22px 26px; }
.modal-ft { padding:0 26px 22px; display:flex; gap:8px; justify-content:flex-end; }

.field { margin-bottom:16px; }
.field label {
  display:block;
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:7px;
}
.field input {
  width:100%;
  font-family:var(--mono);
  font-size:13px;
  padding:9px 12px;
  border:1.5px solid var(--border);
  border-radius:var(--r);
  background:var(--surface);
  color:var(--text);
  outline:none;
  transition:border-color 0.15s;
}
.field input:focus { border-color:var(--navy); }

/* ── CHECKLIST VIEW ── */
.cl-topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 28px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.cl-back {
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color 0.14s;
  flex-shrink: 0;
}
.cl-back:hover { color:var(--navy); }
.cl-info { flex:1; min-width:0; }
.cl-name { font-family:var(--serif); font-size:16px; font-weight:600; letter-spacing:-0.02em; color:var(--navy); }
.cl-url  { font-size:11px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.prog-track { height:3px; background:var(--border); }
.prog-fill  { height:100%; background:var(--accent); transition:width 0.35s ease; }

.cl-body { max-width:780px; margin:0 auto; padding:24px 28px 72px; }

/* CHECKLIST SECTIONS */
.sec {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--sh);
}
.sec-hd {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}
.sec-hd:hover { background:var(--surface2); }
.sec.open .sec-hd { border-bottom:1px solid var(--border); }
.sec-icon { font-size:14px; flex-shrink:0; width:20px; text-align:center; }
.sec-title { font-family:var(--serif); font-size:14px; font-weight:600; flex:1; letter-spacing:-0.01em; }
.sec-cnt  { font-size:11px; color:var(--muted); }
.sec-chev { font-size:9px; color:var(--muted); transition:transform 0.2s; }
.sec.open .sec-chev { transform:rotate(180deg); }
.sec-bd { display:none; }
.sec.open .sec-bd { display:block; }

/* ITEMS */
.item {
  display: grid;
  grid-template-columns: 20px 1fr auto;
  gap: 11px;
  align-items: start;
  padding: 10px 16px;
  border-bottom: 1px solid #eeede6;
  transition: background 0.1s;
}
.item:last-of-type { border-bottom:none; }
.item:hover { background:var(--surface2); }

.chk {
  width:17px; height:17px;
  border-radius:4px;
  border:1.5px solid var(--border);
  cursor:pointer;
  appearance:none;
  margin-top:2px;
  position:relative;
  transition:all 0.14s;
  background:#fff;
  flex-shrink:0;
}
.chk:checked { background:var(--navy); border-color:var(--navy); }
.chk:checked::after { content:'✓'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-size:9px; font-weight:700; }
.chk.fail { background:var(--red); border-color:var(--red); }
.chk.fail::after { content:'✕'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-size:9px; font-weight:700; }
.chk:disabled { opacity:0.3; cursor:not-allowed; }

.item-lbl strong { display:block; font-weight:500; font-size:12.5px; margin-bottom:2px; line-height:1.3; }
.item-lbl small  { color:var(--muted); font-size:11px; line-height:1.4; }
.item-note-preview { font-size:11px; color:var(--amber); margin-top:3px; font-style:italic; }

.item-acts { display:flex; gap:3px; flex-shrink:0; }
.act {
  background:none;
  border:1px solid var(--border);
  border-radius:4px;
  padding:3px 7px;
  font-family:var(--mono);
  font-size:10px;
  cursor:pointer;
  color:var(--muted);
  transition:all 0.13s;
  white-space:nowrap;
}
.act:hover { border-color:var(--navy); color:var(--navy); }
.act.on-fail { background:var(--red-bg); border-color:#fbb; color:var(--red); }
.act.on-na   { background:var(--surface2); color:var(--muted); }

.note-row {
  padding: 7px 16px 9px 47px;
  background: var(--surface2);
  border-bottom: 1px solid #eeede6;
}
.note-row input {
  width:100%;
  font-family:var(--mono);
  font-size:11px;
  padding:5px 9px;
  border:1px solid var(--border);
  border-radius:4px;
  background:#fff;
  color:var(--text);
  outline:none;
  transition:border-color 0.14s;
}
.note-row input:focus { border-color:var(--navy); }

.sec-notes {
  padding: 9px 16px 11px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 9px;
}
.sec-notes label { font-size:11px; color:var(--muted); flex-shrink:0; }
.sec-notes input {
  flex:1;
  font-family:var(--mono);
  font-size:11px;
  padding:5px 9px;
  border:1px solid var(--border);
  border-radius:4px;
  background:#fff;
  color:var(--text);
  outline:none;
}
.sec-notes input:focus { border-color:var(--navy); }

/* ── SAVE PILL ── */
.save-pill {
  position: fixed;
  bottom: 22px; right: 26px;
  font-size: 11px;
  padding: 8px 16px;
  border-radius: 100px;
  display: flex;
  align-items: center;
  gap: 7px;
  box-shadow: var(--sh-lg);
  opacity: 0;
  transform: translateY(6px);
  transition: all 0.25s;
  pointer-events: none;
  z-index: 80;
}
.save-pill.show { opacity:1; transform:none; }
.save-pill.saving { background:var(--navy); color:#fff; }
.save-pill.ok     { background:var(--green); color:#fff; }
.save-pill.err    { background:var(--red); color:#fff; }

.spin {
  width:13px; height:13px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.65s linear infinite;
  flex-shrink:0;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── TOAST ── */
.toast {
  position:fixed; top:18px; right:22px;
  font-size:12px; padding:9px 16px;
  border-radius:var(--r);
  box-shadow:var(--sh-lg);
  z-index:500;
  opacity:0; transform:translateY(-5px);
  transition:all 0.22s;
  pointer-events:none;
}
.toast.on { opacity:1; transform:none; }
.toast.ok  { background:var(--green); color:#fff; }
.toast.err { background:var(--red); color:#fff; }
.toast.inf { background:var(--navy); color:#fff; }

/* ── LOADER ── */
.loader {
  position:fixed; inset:0;
  background:rgba(239,237,230,0.8);
  backdrop-filter:blur(4px);
  z-index:400;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:13px;
  font-size:12px;
  color:var(--muted);
}
.loader.on { display:flex; }
.big-spin {
  width:32px; height:32px;
  border:3px solid var(--border);
  border-top-color:var(--navy);
  border-radius:50%;
  animation:spin 0.75s linear infinite;
}

/* ── CONFIRM DIALOG ── */
.confirm-box {
  background:var(--red-bg);
  border:1px solid #fcc;
  border-radius:var(--r);
  padding:10px 14px;
  display:none;
  align-items:center;
  gap:10px;
  margin-top:8px;
  font-size:12px;
}
.confirm-box.on { display:flex; }

@media(max-width:640px){
  .sidebar { display:none; }
  .main { margin-left:0; }
  .item { grid-template-columns: 20px 1fr; }
  .item-acts { grid-column:2; }
}
</style>
</head>
<body>

<div class="app">

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-wordmark">Reciprocal<em>.</em>Space</div>
    <div class="sb-sub">QA Dashboard</div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section-label">Views</div>
    <div class="sb-item active" id="nav-dash" onclick="goPage('dash')">
      <span class="si">⊞</span> Dashboard
    </div>
    <div class="sb-item" onclick="openNewModal()">
      <span class="si">＋</span> New Checklist
    </div>
    <div class="sb-section-label">Account</div>
    <div class="sb-item" id="nav-settings" onclick="goPage('settings')">
      <span class="si">⚙</span> Settings
    </div>
  </nav>
  <div class="sb-foot">
    <div class="dot" id="connDot"></div>
    <span id="connLabel">Connecting…</span>
  </div>
</aside>

<!-- ── MAIN ── -->
<main class="main">

  <!-- DASHBOARD -->
  <div class="page on" id="page-dash">
    <div class="topbar">
      <div class="topbar-title">Checklists</div>
      <div class="topbar-right">
        <button class="btn btn-ghost" onclick="loadDash()">↺ Refresh</button>
        <button class="btn btn-accent" onclick="openNewModal()">＋ New</button>
      </div>
    </div>
    <div class="dash-body">
      <div class="stats-row" id="statsRow"></div>
      <div class="grid" id="grid">
        <div class="empty">
          <div class="big-spin" style="margin:0 auto 14px;"></div>
          <p>Loading from Supabase…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- CHECKLIST VIEW -->
  <div class="page" id="page-cl">
    <div class="cl-topbar">
      <div class="cl-back" onclick="goPage('dash')">← Back</div>
      <div class="cl-info">
        <div class="cl-name" id="clName">—</div>
        <div class="cl-url"  id="clUrl">—</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span style="font-size:11px;color:var(--muted);" id="clChecker"></span>
        <button class="btn btn-ghost" onclick="copyReport()">↓ Copy Report</button>
        <button class="btn btn-red" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>

    <!-- summary pills -->
    <div style="padding:10px 28px 0;display:flex;gap:8px;flex-wrap:wrap;" id="clSummary"></div>

    <div class="cl-body" id="clBody"></div>

    <!-- delete confirm -->
    <div style="padding:0 28px;" id="deleteConfirmWrap">
      <div class="confirm-box" id="deleteConfirm">
        <span>Permanently delete this checklist?</span>
        <button class="btn btn-red" onclick="doDelete()" style="padding:5px 12px;">Yes, delete</button>
        <button class="btn btn-ghost" onclick="cancelDelete()" style="padding:5px 12px;">Cancel</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="page" id="page-settings">
    <div class="topbar">
      <div class="topbar-title">Settings</div>
    </div>
    <div style="padding:28px;max-width:480px;">
      <div class="sec" style="overflow:visible;">
        <div style="padding:18px 20px;">
          <h3 style="font-family:var(--serif);font-size:15px;font-weight:600;margin-bottom:16px;">Supabase Connection</h3>
          <div class="field">

<script>
// ══════════════════════════════════════════
// CONFIG — baked in, no setup required
// ══════════════════════════════════════════
const DEFAULT_URL = 'https://dhxvwspdhqpizkrrjign.supabase.co';
const DEFAULT_KEY = 'sb_publishable_bYlVcPXyzi8BpJXpt9oMzA_S1JHfD5X';

function getCfg() {
  return {
    url: localStorage.getItem('rs_sb_url') || DEFAULT_URL,
    key: localStorage.getItem('rs_sb_key') || DEFAULT_KEY,
  };
}

// ══════════════════════════════════════════
// SUPABASE REST HELPERS
// ══════════════════════════════════════════
function sbFetch(path, opts = {}) {
  const { url, key } = getCfg();
  return fetch(`${url}/rest/v1/${path}`, {
    ...opts,
    headers: {
      'apikey': key,
      'Authorization': `Bearer ${key}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
      ...(opts.headers || {}),
    },
  });
}

async function sbGet(path) {
  const r = await sbFetch(path);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbPost(path, body) {
  const r = await sbFetch(path, {
    method: 'POST',
    prefer: 'return=representation',
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbPatch(path, body) {
  const r = await sbFetch(path, {
    method: 'PATCH',
    prefer: 'return=representation',
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbDelete(path) {
  const r = await sbFetch(path, { method: 'DELETE' });
  if (!r.ok) throw new Error(await r.text());
}

// ══════════════════════════════════════════
// CHECKLIST DATA
// ══════════════════════════════════════════
const CHECKLIST = [

    { id:'h5', label:'Social share image (OG image) set', detail:'Test with opengraph.xyz' },
  ]},
];

const TOTAL = CHECKLIST.reduce((a, s) => a + s.items.length, 0);

// ══════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════
let currentId    = null;   // UUID of open checklist
let currentMeta  = {};     // { name, url, checker }
let currentChecks = {};    // { itemId: { checked, failed, na, note }, 'snote-X': '' }
let saveTimer    = null;
let allChecklists = [];

// ══════════════════════════════════════════
// PAGES
// ══════════════════════════════════════════
function goPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('page-' + name).classList.add('on');
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  const nav = document.getElementById('nav-' + name);
  if (nav) nav.classList.add('active');
  if (name === 'dash') loadDash();
}

// ══════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════
async function loadDash() {
  document.getElementById('grid').innerHTML = `
    <div class="empty">
      <div class="big-spin" style="margin:0 auto 14px;"></div>
      <p>Loading from Supabase…</p>
    </div>`;
  document.getElementById('statsRow').innerHTML = '';

  try {
    const rows = await sbGet('checklists?order=created_at.desc');
    allChecklists = rows;
    renderDash(rows);
    setConn(true);
  } catch(e) {
    document.getElementById('grid').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <h3>Could not connect</h3>
        <p>${esc(e.message)}</p>
        <p style="margin-top:8px;">Check your Supabase credentials in Settings, and make sure the <code>checklists</code> table exists.</p>
      </div>`;
    setConn(false);
  }
}

function renderDash(rows) {
  // Stats
  const done     = rows.filter(r => pct(r) === 100).length;
  const hasFail  = rows.filter(r => countFailed(r.checks) > 0).length;
  const inProg   = rows.filter(r => pct(r) > 0 && pct(r) < 100).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-n">${rows.length}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green)">${done}</div><div class="stat-l">Complete</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--amber)">${inProg}</div><div class="stat-l">In Progress</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--red)">${hasFail}</div><div class="stat-l">Have Failures</div></div>
  `;

  if (!rows.length) {
    document.getElementById('grid').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <h3>No checklists yet</h3>
        <p>Create your first QA checklist — it'll be saved to your shared Supabase database instantly.</p>
        <button class="btn btn-accent" onclick="openNewModal()">＋ New Checklist</button>
      </div>`;
    return;
  }

  document.getElementById('grid').innerHTML = rows.map(r => {
    const p = pct(r);
    const barClass = p === 100 ? 'bar-done' : p >= 70 ? 'bar-high' : p >= 30 ? 'bar-mid' : p > 0 ? 'bar-low' : 'bar-todo';
    const pctColor = p === 100 ? 'var(--navy)' : p >= 70 ? 'var(--green)' : p >= 30 ? 'var(--amber)' : p > 0 ? 'var(--red)' : 'var(--muted)';
    const passed = countPassed(r.checks);
    const failed = countFailed(r.checks);
    const na     = countNA(r.checks);
    const date   = new Date(r.created_at).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
    const updated = r.updated_at !== r.created_at
      ? new Date(r.updated_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})
      : null;
    return `
      <div class="card" onclick="openChecklist('${r.id}')">
        <div class="card-bar ${barClass}"></div>
        <div class="card-body">
          <div class="card-name">${esc(r.name)}</div>
          <div class="card-url">${esc(r.url) || '<span style="opacity:0.4">No URL set</span>'}</div>
          <div class="card-foot">
            <div class="card-pct" style="color:${pctColor}">${p}%</div>
            <div class="card-meta">
              ${passed}/${TOTAL - na} passed<br>
              ${updated ? `Updated ${updated}` : date}
            </div>
          </div>
          <div class="chips">
            ${failed > 0 ? `<span class="chip chip-red">✕ ${failed} failed</span>` : ''}
            ${p === 100 ? `<span class="chip chip-green">✓ Complete</span>` : ''}
            ${r.checker ? `<span class="chip chip-navy">${esc(r.checker)}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ══════════════════════════════════════════
// HELPERS — counts & pct
// ══════════════════════════════════════════
function countPassed(c) { return Object.keys(c||{}).filter(k=>!k.startsWith('snote-')&&c[k].checked).length; }
function countFailed(c) { return Object.keys(c||{}).filter(k=>!k.startsWith('snote-')&&c[k].failed).length; }
function countNA(c)     { return Object.keys(c||{}).filter(k=>!k.startsWith('snote-')&&c[k].na).length; }
function pct(r) {
  const c = r.checks || {};
  const passed = countPassed(c);
  const na     = countNA(c);
  return Math.round((passed / Math.max(1, TOTAL - na)) * 100);
}

// ══════════════════════════════════════════
// NEW CHECKLIST
// ══════════════════════════════════════════
function openNewModal() {
  document.getElementById('newOverlay').classList.add('on');
  setTimeout(() => document.getElementById('nName').focus(), 80);
}
function closeNewModal() {
  document.getElementById('newOverlay').classList.remove('on');
}

async function createChecklist() {
  const name    = document.getElementById('nName').value.trim();
  const url     = document.getElementById('nUrl').value.trim();
  const checker = document.getElementById('nChecker').value.trim();
  if (!name) { toast('Enter a project name first', 'err'); return; }

  const btn = document.getElementById('createBtn');
  btn.disabled = true; btn.textContent = 'Creating…';

  try {
    const rows = await sbPost('checklists', { name, url, checker, checks: {} });
    const row  = Array.isArray(rows) ? rows[0] : rows;
    closeNewModal();
    btn.disabled = false; btn.textContent = 'Create →';
    ['nName','nUrl','nChecker'].forEach(id => document.getElementById(id).value = '');
    // Open directly with fresh data — no reload needed
    openChecklist(row.id, row);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Create →';
    toast('Error: ' + e.message, 'err');
  }
}

// ══════════════════════════════════════════
// CHECKLIST VIEW
// ══════════════════════════════════════════
async function openChecklist(id, rowData) {
  showLoader('Loading checklist…');
  currentId = id;

  try {
    let row = rowData;
    if (!row) {
      const rows = await sbGet(`checklists?id=eq.${id}`);
      row = rows[0];
      if (!row) throw new Error('Checklist not found.');
    }

    currentMeta   = { name: row.name, url: row.url, checker: row.checker };
    currentChecks = row.checks || {};

    document.getElementById('clName').textContent    = row.name;
    document.getElementById('clUrl').textContent     = row.url || 'No URL set';
    document.getElementById('clChecker').textContent = row.checker ? `By ${row.checker}` : '';
    document.getElementById('deleteConfirm').classList.remove('on');

    renderChecklist();
    updateProgress();
    updateSummary();
    hideLoader();
    goPageDirect('cl');
  } catch(e) {
    hideLoader();
    toast('Could not load: ' + e.message, 'err');
  }
}

function goPageDirect(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('page-' + name).classList.add('on');
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
}

function renderChecklist() {
  document.getElementById('clBody').innerHTML = CHECKLIST.map((sec, si) => {
    const sNote = currentChecks['snote-' + sec.id] || '';
    return `
      <div class="sec ${si===0?'open':''}" id="sec-${sec.id}">
        <div class="sec-hd" onclick="toggleSec('${sec.id}')">
          <span class="sec-icon">${sec.icon}</span>
          <span class="sec-title">${sec.title}</span>
          <span class="sec-cnt" id="scnt-${sec.id}"></span>
          <span class="sec-chev">▼</span>
        </div>
        <div class="sec-bd">
          ${sec.items.map(item => renderItem(item)).join('')}
          <div class="sec-notes">
            <label>Notes</label>
            <input type="text" placeholder="Section-level notes…" value="${esc(sNote)}"
              onchange="setSNote('${sec.id}', this.value)">
          </div>
        </div>
      </div>`;
  }).join('');
  updateAllCounts();
}

function renderItem(item) {
  const s = currentChecks[item.id] || {};
  const chkCls = s.failed ? 'fail' : '';
  const showNote = s.failed || (s.note !== undefined && s.note !== '');
  return `
    <div class="item" id="item-${item.id}">
      <input type="checkbox" class="chk ${chkCls}" id="chk-${item.id}"
        ${s.checked ? 'checked' : ''}
        ${s.na ? 'disabled' : ''}
        onchange="toggleCheck('${item.id}', this.checked)">
      <div class="item-lbl">
        <strong style="${s.na?'opacity:0.35;text-decoration:line-through;':''}">${item.label}</strong>
        ${item.detail ? `<small>${item.detail}</small>` : ''}
        ${s.note ? `<div class="item-note-preview">↳ ${esc(s.note)}</div>` : ''}
      </div>
      <div class="item-acts">
        <button class="act ${s.failed?'on-fail':''}" onclick="toggleFail('${item.id}')">✕ Fail</button>
        <button class="act ${s.na?'on-na':''}"     onclick="toggleNA('${item.id}')">N/A</button>
        <button class="act"                          onclick="promptNote('${item.id}')">+ Note</button>
      </div>
    </div>
    <div class="note-row" id="nr-${item.id}" style="${showNote?'':'display:none;'}">
      <input type="text" placeholder="Describe the issue…" value="${esc(s.note||'')}"
        oninput="setNote('${item.id}', this.value)">
    </div>`;
}

function toggleSec(id) {
  document.getElementById('sec-'+id).classList.toggle('open');
}

// State mutations
function getS(id) { return currentChecks[id] || {}; }
function setS(id, upd) {
  currentChecks[id] = { ...getS(id), ...upd };
  scheduleSave();
  updateProgress();
  updateSummary();
  updateAllCounts();
}

function toggleCheck(id, checked) {
  setS(id, { checked, failed: false });
  refreshItem(id);
}
function toggleFail(id) {
  const s = getS(id);
  const now = !s.failed;
  setS(id, { failed: now, checked: false, na: false });
  refreshItem(id);
  if (now) { showNoteRow(id); document.querySelector(`#nr-${id} input`)?.focus(); }
}
function toggleNA(id) {
  const s = getS(id);
  setS(id, { na: !s.na, checked: false, failed: false });
  refreshItem(id);
}
function promptNote(id) {
  if (!currentChecks[id]) currentChecks[id] = {};
  if (currentChecks[id].note === undefined) currentChecks[id].note = '';
  showNoteRow(id);
  document.querySelector(`#nr-${id} input`)?.focus();
}
function setNote(id, val) { setS(id, { note: val }); }
function setSNote(secId, val) {
  currentChecks['snote-'+secId] = val;
  scheduleSave();
}
function showNoteRow(id) {
  const nr = document.getElementById('nr-'+id);
  if (nr) nr.style.display = '';
}

function refreshItem(id) {
  const sec  = CHECKLIST.find(s => s.items.some(i => i.id === id));
  const item = sec?.items.find(i => i.id === id);
  if (!item) return;
  const el = document.getElementById('item-'+id);
  const nr = document.getElementById('nr-'+id);
  if (!el) return;

  const s = currentChecks[id] || {};
  const chkCls = s.failed ? 'fail' : '';
  el.innerHTML = `
    <input type="checkbox" class="chk ${chkCls}" id="chk-${id}"
      ${s.checked?'checked':''} ${s.na?'disabled':''}
      onchange="toggleCheck('${id}', this.checked)">
    <div class="item-lbl">
      <strong style="${s.na?'opacity:0.35;text-decoration:line-through;':''}">${item.label}</strong>
      ${item.detail ? `<small>${item.detail}</small>` : ''}
      ${s.note ? `<div class="item-note-preview">↳ ${esc(s.note)}</div>` : ''}
    </div>
    <div class="item-acts">
      <button class="act ${s.failed?'on-fail':''}" onclick="toggleFail('${id}')">✕ Fail</button>
      <button class="act ${s.na?'on-na':''}"       onclick="toggleNA('${id}')">N/A</button>
      <button class="act"                            onclick="promptNote('${id}')">+ Note</button>
    </div>`;
  if (nr) {
    nr.style.display = (s.failed || (s.note !== undefined && s.note !== '')) ? '' : 'none';
    const inp = nr.querySelector('input');
    if (inp) inp.value = s.note || '';
  }
}

function updateProgress() {
  const passed = countPassed(currentChecks);
  const na     = countNA(currentChecks);
  const p      = Math.round((passed / Math.max(1, TOTAL - na)) * 100);
  document.getElementById('progFill').style.width = p + '%';
}

function updateSummary() {
  const passed = countPassed(currentChecks);
  const failed = countFailed(currentChecks);
  const na     = countNA(currentChecks);
  const p      = Math.round((passed / Math.max(1, TOTAL - na)) * 100);
  document.getElementById('clSummary').innerHTML = `
    <span class="chip chip-navy">${p}% complete</span>
    <span class="chip chip-green">✓ ${passed} passed</span>
    ${failed>0?`<span class="chip chip-red">✕ ${failed} failed</span>`:''}
    ${na>0?`<span class="chip" style="background:var(--surface2);color:var(--muted);">${na} N/A</span>`:''}
  `;
}

function updateAllCounts() {
  CHECKLIST.forEach(sec => {
    const done = sec.items.filter(i => {
      const s = currentChecks[i.id] || {};
      return s.checked || s.na;
    }).length;
    const el = document.getElementById('scnt-'+sec.id);
    if (el) el.textContent = `${done}/${sec.items.length}`;
  });
}

// ══════════════════════════════════════════
// SAVE TO SUPABASE
// ══════════════════════════════════════════
function scheduleSave() {
  clearTimeout(saveTimer);
  setPill('saving', 'Saving…', true);
  saveTimer = setTimeout(doSave, 1000);
}

async function doSave() {
  try {
    await sbPatch(`checklists?id=eq.${currentId}`, {
      checks: currentChecks,
      updated_at: new Date().toISOString(),
    });
    setPill('ok', 'Saved ✓', false);
    setTimeout(hidePill, 2000);
  } catch(e) {
    setPill('err', 'Save failed — ' + e.message, false);
  }
}

function setPill(cls, txt, spin) {
  const pill = document.getElementById('savePill');
  pill.className = `save-pill show ${cls}`;
  document.getElementById('saveTxt').textContent = txt;
  document.getElementById('saveSpin').style.display = spin ? '' : 'none';
}
function hidePill() {
  document.getElementById('savePill').className = 'save-pill';
}

// ══════════════════════════════════════════
// DELETE
// ══════════════════════════════════════════
function confirmDelete() {
  document.getElementById('deleteConfirm').classList.add('on');
}
function cancelDelete() {
  document.getElementById('deleteConfirm').classList.remove('on');
}
async function doDelete() {
  try {
    await sbDelete(`checklists?id=eq.${currentId}`);
    toast('Checklist deleted', 'inf');
    goPage('dash');
  } catch(e) {
    toast('Delete failed: ' + e.message, 'err');
  }
}

// ══════════════════════════════════════════
// EXPORT REPORT
// ══════════════════════════════════════════
function copyReport() {
  const passed = countPassed(currentChecks);
  const failed = countFailed(currentChecks);
  const na     = countNA(currentChecks);
  const p      = Math.round((passed / Math.max(1, TOTAL - na)) * 100);
  const date   = new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});

  let out = `RS QA REPORT\n${'═'.repeat(48)}\n`;
  out += `Project:    ${currentMeta.name || '—'}\n`;
  out += `URL:        ${currentMeta.url  || '—'}\n`;
  out += `Checked by: ${currentMeta.checker || '—'}\n`;
  out += `Date:       ${date}\n`;
  out += `Score:      ${p}% — ${passed} passed, ${failed} failed, ${na} N/A\n`;
  out += `${'─'.repeat(48)}\n\n`;

  const fails = [], notes = [];
  CHECKLIST.forEach(sec => {
    sec.items.forEach(item => {
      const s = currentChecks[item.id] || {};
      if (s.failed) fails.push(`  [FAIL] ${item.label}\n         Section: ${sec.title}${s.note?'\n         Note: '+s.note:''}`);
      else if (s.note?.trim()) notes.push(`  [NOTE] ${item.label}\n         ${s.note}`);
    });
    const sn = currentChecks['snote-'+sec.id];
    if (sn?.trim()) notes.push(`  [NOTE] ${sec.title} (section)\n         ${sn}`);
  });

  out += fails.length ? `FAILURES (${fails.length})\n${fails.join('\n')}\n\n` : `No failures recorded ✓\n\n`;
  if (notes.length) out += `NOTES (${notes.length})\n${notes.join('\n')}\n`;

  navigator.clipboard.writeText(out)
    .then(()  => toast('Report copied to clipboard ✓', 'ok'))
    .catch(()  => { prompt('Copy report:', out); });
}

// ══════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════
function saveSettings() {
  const url = document.getElementById('setUrl').value.trim();
  const key = document.getElementById('setKey').value.trim();
  if (url) localStorage.setItem('rs_sb_url', url);
  if (key) localStorage.setItem('rs_sb_key', key);
  document.getElementById('setStatus').textContent = 'Saved — reloading dashboard…';
  setTimeout(() => { goPage('dash'); document.getElementById('setStatus').textContent = ''; }, 800);
}
function clearSettings() {
  if (!confirm('Reset to default credentials?')) return;
  localStorage.removeItem('rs_sb_url');
  localStorage.removeItem('rs_sb_key');
  location.reload();
}

// ══════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
}
function toast(msg, type='inf') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast on ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2800);
}
function showLoader(msg) {
  document.getElementById('loaderTxt').textContent = msg || 'Loading…';
  document.getElementById('loader').classList.add('on');
}
function hideLoader() {
  document.getElementById('loader').classList.remove('on');
}
function setConn(ok) {
  document.getElementById('connDot').className   = 'dot ' + (ok?'ok':'');
  document.getElementById('connLabel').textContent = ok ? 'Connected' : 'Not connected';
}

// Modal backdrop close
document.getElementById('newOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeNewModal();
});

// Enter key shortcuts in modal
document.getElementById('nName').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('nUrl').focus(); });
document.getElementById('nUrl').addEventListener('keydown',  e => { if(e.key==='Enter') document.getElementById('nChecker').focus(); });
document.getElementById('nChecker').addEventListener('keydown', e => { if(e.key==='Enter') createChecklist(); });

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
// Pre-fill settings page with current values
document.getElementById('setUrl').value = getCfg().url;
document.getElementById('setKey').value = getCfg().key;

// Boot
loadDash();
</script>
